services:
  postgres:
    image: postgres:17-alpine
    container_name: pennywise-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pennywise
      POSTGRES_PASSWORD: pennywise
      POSTGRES_DB: pennywise
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pennywise -d pennywise"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
